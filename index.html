<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1115">
    <meta name="description" content="Zehedisode Oto Y&#305;kama - Yerel y&#246;netim ve CRM paneli">
    <title>Zehedisode Oto Y&#305;kama - Y&#246;netim Paneli</title>

    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg">
    <link rel="apple-touch-icon" href="./assets/icons/icon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/tailwind.css">
    <link rel="stylesheet" href="./assets/css/styles.css">

    <script src="./assets/vendor/react.production.min.js"></script>
    <script src="./assets/vendor/react-dom.production.min.js"></script>
</head>
<body class="bg-darkBg-deep min-h-screen text-gray-200 antialiased selection:bg-brand-500 selection:text-white">
    <div id="root"></div>

    <script src="./assets/js/app.js"></script>
    <script>
      // Service Worker kaydi + otomatik guncelleme.
      // - Sayfa her acilista SW'yi update'a zorlar.
      // - Yeni surum bulunursa kullanici reload bekleyince devraliyoruz.
      // - controllerchange tetiklendiginde sayfayi bir kez otomatik yeniler.
      if ('serviceWorker' in navigator) {
        let isReloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (isReloading) return;
          isReloading = true;
          window.location.reload();
        });

        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./service-worker.js')
            .then((registration) => {
              try { registration.update(); } catch (_) { /* yoksay */ }

              const promote = (worker) => {
                if (!worker) return;
                worker.addEventListener('statechange', () => {
                  if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Yeni surum hazir, hemen devral.
                    worker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              };

              if (registration.waiting && navigator.serviceWorker.controller) {
                registration.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
              promote(registration.installing);
              registration.addEventListener('updatefound', () => promote(registration.installing));

              // Sekme tekrar gorunur olursa SW'yi tekrar update'le.
              document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                  registration.update().catch(() => undefined);
                }
              });
            })
            .catch(function () { /* offline cache opsiyonel, hata sessizce yutulur */ });
        });
      }
    </script>
</body>
</html>
